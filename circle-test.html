<!DOCTYPE html>
<html><head>
<meta charset="UTF-8"/>
<title>SENTINEL — Advisory Marker Test v7</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>body{margin:0;background:#000;color:#e5e5e5;font-family:monospace}#map{width:100vw;height:92vh}#status{padding:8px 16px;background:#111;border-top:1px solid #333;font-size:13px}.pass{color:#30d158}.fail{color:#ff3b30}</style>
</head><body>
<div id="map"></div>
<div id="status">Loading...</div>
<script>
var status=document.getElementById('status');
try{
  var map=L.map('map',{center:[20,15],zoom:2,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd'}).addTo(map);
  var data=[
    {n:'Afghanistan',lat:33.9,lon:67.7,sz:28,lv:4},{n:'Ukraine',lat:48.4,lon:31.2,sz:32,lv:4},
    {n:'Russia',lat:61.5,lon:90,sz:80,lv:4},{n:'Iran',lat:32.4,lon:53.7,sz:38,lv:4},
    {n:'Iraq',lat:33.2,lon:43.7,sz:26,lv:4},{n:'Syria',lat:35,lon:38.5,sz:22,lv:4},
    {n:'Sudan',lat:15.5,lon:30,sz:38,lv:4},{n:'Libya',lat:26.3,lon:17.2,sz:38,lv:4},
    {n:'Yemen',lat:15.6,lon:48.5,sz:24,lv:4},{n:'Somalia',lat:5.2,lon:46.2,sz:26,lv:4},
    {n:'Venezuela',lat:6.4,lon:-66.6,sz:30,lv:4},{n:'Myanmar',lat:19.8,lon:96.9,sz:28,lv:4},
    {n:'Haiti',lat:19,lon:-72.1,sz:14,lv:4},{n:'North Korea',lat:40,lon:127,sz:18,lv:4},
    {n:'Pakistan',lat:30.4,lon:69.3,sz:32,lv:3},{n:'Nigeria',lat:9.1,lon:8.7,sz:30,lv:3},
    {n:'Ethiopia',lat:9.1,lon:40.5,sz:32,lv:3},{n:'DR Congo',lat:-4.0,lon:21.8,sz:38,lv:3},
    {n:'Colombia',lat:4.6,lon:-74.3,sz:30,lv:3},{n:'Kenya',lat:-0.2,lon:37.9,sz:24,lv:3},
    {n:'Mexico',lat:23.6,lon:-102.5,sz:40,lv:2},{n:'Brazil',lat:-14.2,lon:-51.9,sz:60,lv:2},
    {n:'India',lat:20.6,lon:79,sz:50,lv:2},{n:'China',lat:35.9,lon:104.2,sz:60,lv:2},
    {n:'Egypt',lat:26.8,lon:30.8,sz:30,lv:2},{n:'Turkey',lat:39,lon:35.2,sz:30,lv:2}
  ];
  var fills={4:'rgba(255,59,48,0.45)',3:'rgba(255,149,0,0.35)',2:'rgba(255,214,10,0.25)'};
  var borders={4:'rgba(255,59,48,0.7)',3:'rgba(255,149,0,0.6)',2:'rgba(255,214,10,0.5)'};
  var count=0;
  data.forEach(function(c){
    var s=c.sz;
    var icon=L.divIcon({className:'',iconSize:[s,s],iconAnchor:[s/2,s/2],
      html:'<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+fills[c.lv]+';border:1.5px solid '+borders[c.lv]+'"></div>'
    });
    L.marker([c.lat,c.lon],{icon:icon}).addTo(map);
    count++;
  });
  status.innerHTML='<span class="pass">v7 TEST PASSED: '+count+' advisory div-markers on map. You should see colored circles on countries (red=L4, orange=L3, yellow=L2).</span>';
}catch(e){
  status.innerHTML='<span class="fail">ERROR: '+e.message+'</span>';
}
</script>
</body></html>
